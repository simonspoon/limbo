name: swe-full-cycle
description: Full software engineering cycle with test plan, review, gate, and retrospective
tasks:
  - name: "Plan"
    approach: "Research, explore codebase, design approach, define test plan"
    verify: "Design and test plan documented with acceptance criteria"
    result: "Design approach and test plan"
    children:
      - name: "Research requirements"
        approach: "Understand the problem and gather requirements"
        verify: "Requirements documented"
        result: "Requirements summary"
      - name: "Explore codebase"
        approach: "Read relevant code and architecture docs"
        verify: "Key patterns and conventions identified"
        result: "Codebase context notes"
      - name: "Design approach"
        approach: "Design the solution based on research and exploration"
        verify: "Design covers all requirements"
        result: "Design document"
        blocked_by: ["Research requirements", "Explore codebase"]
      - name: "Define test plan"
        approach: "Define acceptance criteria and test scenarios"
        verify: "Test plan covers happy path, edge cases, and error cases"
        result: "Test plan with acceptance criteria"
        blocked_by: ["Design approach"]
  - name: "Implement"
    approach: "Write code per the design"
    verify: "Code builds clean"
    result: "List of files created and modified"
    blocked_by: ["Plan"]
  - name: "Test"
    approach: "Generate tests from test plan and run full suite"
    verify: "All tests pass with race detector, lint clean"
    result: "Test results and coverage"
    blocked_by: ["Implement"]
  - name: "Review"
    approach: "Code review all changes"
    verify: "Review verdict is APPROVE"
    result: "Review output with verdict"
    blocked_by: ["Test"]
    children:
      - name: "Code review"
        approach: "Review diffs for bugs, security, and conventions"
        verify: "Structured review output produced"
        result: "Review with Critical/Warnings/Info/Verdict"
      - name: "Address feedback"
        approach: "Fix issues raised in review"
        verify: "All review feedback addressed"
        result: "List of changes made"
        blocked_by: ["Code review"]
  - name: "Completion gate"
    approach: "Verify all phases executed with evidence"
    verify: "Evidence collected for every phase"
    result: "Evidence summary"
    blocked_by: ["Review"]
  - name: "Retrospective"
    approach: "Answer friction, test plan accuracy, and lesson questions"
    verify: "All 3 questions answered"
    result: "Retrospective summary with follow-up actions"
    blocked_by: ["Completion gate"]
  - name: "Deliver"
    approach: "Commit and create PR"
    verify: "Commit exists on feature branch"
    result: "Commit hash and PR URL"
    blocked_by: ["Retrospective"]
