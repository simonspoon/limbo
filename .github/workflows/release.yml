name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run tests
        run: go test -v ./...

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          LDFLAGS: -s -w -X github.com/simonspoon/limbo/internal/commands.Version=${{ github.ref_name }}
        run: |
          mkdir -p dist

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/limbo-linux-amd64 ./cmd/limbo

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/limbo-linux-arm64 ./cmd/limbo

          # Darwin amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/limbo-darwin-amd64 ./cmd/limbo

          # Darwin arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/limbo-darwin-arm64 ./cmd/limbo

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/limbo-windows-amd64.exe ./cmd/limbo

          # Windows arm64
          GOOS=windows GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/limbo-windows-arm64.exe ./cmd/limbo

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/limbo-linux-amd64
            dist/limbo-linux-arm64
            dist/limbo-darwin-amd64
            dist/limbo-darwin-arm64
            dist/limbo-windows-amd64.exe
            dist/limbo-windows-arm64.exe
            dist/checksums.txt
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/simonspoon/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tool]=limbo" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[repo]=simonspoon/limbo"
